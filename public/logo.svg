<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Mic body -->
  <rect x="35" y="25" width="30" height="42" rx="15" fill="url(#micGrad)"/>

  <!-- Mic head curve -->
  <path d="M35 40 Q35 25 50 25 Q65 25 65 40" stroke="white" stroke-width="0" fill="url(#micGrad)"/>

  <!-- Mic stand arc -->
  <path d="M30 55 Q30 72 50 72 Q70 72 70 55" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Mic stand vertical -->
  <line x1="50" y1="72" x2="50" y2="85" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- Mic stand base -->
  <line x1="35" y1="85" x2="65" y2="85" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- Sound waves -->
  <path d="M72 35 Q78 40 72 50" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M80 28 Q88 40 80 55" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M28 35 Q22 40 28 50" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M20 28 Q12 40 20 55" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>